<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Aleeza Sahar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .navbar { background-color: #1a2a6c !important; }
        .contact-header { background: #1a2a6c; color: white; padding: 60px 0; }
        .contact-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .info-sidebar { background: #00d4ff; color: #1a2a6c; padding: 40px; height: 100%; }
        .form-section { background: white; padding: 40px; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
        .btn-submit { background: #1a2a6c; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: 600; width: 100%; }
        .btn-submit:hover { background: #00d4ff; color: #1a2a6c; }
        .social-links a { font-size: 1.5rem; color: #1a2a6c; margin-right: 15px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">ALEEZA.AI</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="contact-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold">Get In Touch</h1>
            <p>Let's discuss AI, internships, or potential collaborations!</p>
        </div>
    </header>

    <div class="container my-5">
        <div class="row contact-card g-0">
            <div class="col-md-4">
                <div class="info-sidebar">
                    <h3>Contact Info</h3>
                    <p class="mt-4"><i class="fas fa-envelope me-2"></i> SP25-BAI-047@cuilahore.edu.pk</p>
                    <p><i class="fas fa-location-dot me-2"></i> COMSATS University, Lahore</p>
                    <div class="social-links mt-5">
                        <a href="https://www.linkedin.com/in/aleeza-sahar-457304382" target="_blank"><i class="fab fa-linkedin"></i></a>
                        <a href="https://github.com/sp25-bai-047-wq" target="_blank"><i class="fab fa-github"></i></a>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="form-section">
                    <form action="https://formspree.io/f/xeengzbw" method="POST">
    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Enter your name" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea name="message" class="form-control" rows="5" placeholder="Write your message here..." required></textarea>
    </div>
    <button type="submit" class="btn-submit">Send Message</button>
</form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <p>© 2026 Aleeza Sahar | BSAI</p>
    </footer>

</body>
</html>
